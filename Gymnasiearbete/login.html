<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="login-glass-box">
        <div class="login-box">
            <h2>Logga in</h2>
            <form id="loginForm">
                <input type="text" id="loginAnvändarNamn" required placeholder="Användar Namn">
                <input type="password" id="loginLösenord" required placeholder="Lösenord">
                <button type="submit">Logga in</button>
            </form>
        </div>
    </div>

    <script type="module" src="login.js"></script>

</body>
</html>
